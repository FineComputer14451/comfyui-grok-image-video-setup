name: Validate scaffold

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run scaffold validation
        run: ./scripts/validate.sh
